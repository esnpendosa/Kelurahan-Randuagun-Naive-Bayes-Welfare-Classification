{{define "title"}}Tambah Warga{{end}}
{{define "header"}}Input Data Kependudukan Baru{{end}}

{{define "content"}}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h3 style="margin-bottom: 24px;">Informasi Dasar Warga</h3>
    <form action="/warga/simpan" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>NIK (Nomor Induk Kependudukan)</label>
                <input type="text" name="nik" placeholder="Masukkan 16 digit NIK" required>
            </div>
            <div class="form-group">
                <label>Nomor KK</label>
                <input type="text" name="no_kk" placeholder="Masukkan Nomor Kartu Keluarga" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nama Lengkap (Kepala Keluarga)</label>
            <input type="text" name="nama" placeholder="Masukkan nama lengkap" required>
        </div>

        <div class="form-group">
            <label>Alamat</label>
            <input type="text" name="alamat" placeholder="Masukkan alamat jalan/gang" required>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr 2fr;">
            <div class="form-group">
                <label>RT</label>
                <input type="text" name="rt" placeholder="000" required>
            </div>
            <div class="form-group">
                <label>RW</label>
                <input type="text" name="rw" placeholder="000" required>
            </div>
            <div class="form-group">
                <label>Kelurahan</label>
                <input type="text" name="kelurahan" placeholder="Nama Kelurahan" required>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);">
            <a href="/warga" class="btn btn-secondary">Batal</a>
            <button type="submit" class="btn btn-primary">Simpan Data Warga</button>
        </div>
    </form>
</div>
{{end}}

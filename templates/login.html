<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kelurahan Randuagung</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h2 {
            color: #0d9488;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #64748b;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>RANDUAGUNG</h2>
            <p>Sistem Klasifikasi Kesejahteraan Masyarakat</p>
        </div>

        {{if .Error}}
        <div style="background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.875rem; text-align: center;">
            {{.Error}}
        </div>
        {{end}}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Nama Pengguna</label>
                <input type="text" name="username" placeholder="Masukkan username" required autofocus>
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" name="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 12px; font-size: 1rem;">Masuk ke Sistem</button>
        </form>

        <p style="text-align: center; margin-top: 24px; font-size: 0.75rem; color: #94a3b8;">
            &copy; 2026 Pemerintah Desa Randuagung
        </p>
    </div>
</body>
</html>

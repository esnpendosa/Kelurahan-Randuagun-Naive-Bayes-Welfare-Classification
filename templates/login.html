<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Klasifikasi Kesejahteraan Randuagung</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f6f8;
        }
        .login-wrap {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }
        .login-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .login-brand-dot {
            width: 8px;
            height: 8px;
            background: #2563eb;
            border-radius: 50%;
        }
        .login-brand-text h1 {
            font-size: 0.875rem;
            font-weight: 700;
            color: #111827;
        }
        .login-brand-text p {
            font-size: 0.6875rem;
            color: #6b7280;
            margin-top: 1px;
        }
        .login-card {
            background: white;
            border: 1px solid #e4e7ec;
            border-radius: 8px;
            padding: 28px 24px;
        }
        .login-card h2 {
            font-size: 0.9375rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 4px;
        }
        .login-card p {
            font-size: 0.8125rem;
            color: #6b7280;
            margin-bottom: 22px;
        }
        .login-btn {
            width: 100%;
            padding: 9px 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 4px;
        }
        .login-btn:hover { background: #1d4ed8; }
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 9px 12px;
            border-radius: 6px;
            font-size: 0.8125rem;
            margin-bottom: 16px;
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.6875rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <div class="login-brand-dot"></div>
            <div class="login-brand-text">
                <h1>Kelurahan Randuagung</h1>
                <p>Sistem Klasifikasi Kesejahteraan Masyarakat</p>
            </div>
        </div>

        <div class="login-card">
            <h2>Masuk ke Sistem</h2>
            <p>Gunakan akun yang diberikan administrator.</p>

            {{if .Error}}
            <div class="error-msg">{{.Error}}</div>
            {{end}}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Nama Pengguna</label>
                    <input id="username" type="text" name="username" placeholder="Username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input id="password" type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Masuk</button>
            </form>
        </div>

        <p class="login-footer">© 2026 Kelurahan Randuagung · Naive Bayes v2.0</p>
    </div>
</body>
</html>
